<script>
/* Auto-fit roadmap to viewport width */
(function(){
  var debounceTimer = null;
  function fitRoadmap(){
    var wrapper = document.getElementById('roadmapWrapper');
    var canvas = document.getElementById('roadmapCanvas');
    if(!wrapper||!canvas) return;
    /* Reset to measure natural width */
    canvas.style.transform = 'none';
    canvas.style.marginBottom = '';
    /* Force reflow */
    void canvas.offsetWidth;
    /* Use actual visible width: viewport minus sidebar */
    var sidebar = document.querySelector('.sidebar');
    var sidebarW = (sidebar && getComputedStyle(sidebar).display !== 'none') ? sidebar.offsetWidth : 0;
    var wW = Math.min(wrapper.clientWidth, window.innerWidth - sidebarW) - 48;
    /* Find the widest child element */
    var maxChildW = 0;
    var children = canvas.children;
    for(var i=0;i<children.length;i++){
      var w = children[i].scrollWidth;
      if(w>maxChildW) maxChildW = w;
    }
    var cW = Math.max(canvas.scrollWidth, maxChildW);
    if(cW > wW && cW > 0){
      var scale = wW / cW;
      canvas.style.transform = 'scale(' + scale + ')';
      canvas.style.transformOrigin = 'top left';
      var h = canvas.scrollHeight;
      canvas.style.marginBottom = '-' + (h * (1 - scale)) + 'px';
    } else {
      canvas.style.transform = '';
      canvas.style.marginBottom = '';
    }
  }
  function debouncedFit(){ clearTimeout(debounceTimer); debounceTimer = setTimeout(fitRoadmap, 150); }
  var obs = new MutationObserver(debouncedFit);
  var canvas = document.getElementById('roadmapCanvas');
  if(canvas) obs.observe(canvas, {childList:true, subtree:true});
  window.addEventListener('resize', debouncedFit);
  setTimeout(fitRoadmap, 400);
})();
</script>
